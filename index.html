<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERAK</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 12px;
  background: black;
  letter-spacing: 3px;
}

/* SECTIONS */
.section {
  display: none;
  padding-bottom: 70px;
}
.active {
  display: block;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 12px;
  padding: 12px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 8px;
}

button {
  width: 100%;
  padding: 8px;
  background: white;
  color: black;
  border: none;
  border-radius: 5px;
}

/* CART */
.cart-item {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: black;
  padding: 10px 0;
}

.navbar div {
  text-align: center;
  font-size: 14px;
  cursor: pointer;
}

/* FORM */
input, textarea {
  width: 90%;
  margin: 5px auto;
  display: block;
  padding: 10px;
  border-radius: 5px;
  border: none;
}
</style>
</head>

<body>

<header>SERAK</header>

<!-- HOME -->
<div id="home" class="section active">
  <h2 style="text-align:center;">Street Collection</h2>
  <div class="products" id="productList"></div>
</div>

<!-- CART -->
<div id="cart" class="section">
  <h2 style="text-align:center;">Your Cart</h2>
  <div id="cartItems"></div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
  <h2 style="text-align:center;">Your Details</h2>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <textarea id="address" placeholder="Address"></textarea>
  <button onclick="placeOrder()">Place Order</button>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div onclick="showSection('home')">🏠 Home</div>
  <div onclick="showSection('cart')">🛒 Cart (<span id="count">0</span>)</div>
  <div onclick="showSection('profile')">👤 Profile</div>
</div>

<script>
const products = [
  {name:"Oversized Tee", price:499, img:"https://images.unsplash.com/photo-1523381210434-271e8be1f52b"},
  {name:"Hoodie", price:1499, img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
  {name:"Cargo Pants", price:1299, img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"},
  {name:"Denim Jacket", price:1999, img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"}
];

let cart = [];

function showSection(id) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function renderProducts() {
  const container = document.getElementById("productList");

  products.forEach((p,i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-content">
          <h4>${p.name}</h4>
          <p>₹${p.price}</p>
          <button onclick="addToCart(${i})">Add</button>
        </div>
      </div>
    `;
  });
}

function addToCart(i) {
  cart.push(products[i]);
  updateCart();
}

function updateCart() {
  document.getElementById("count").innerText = cart.length;

  const list = document.getElementById("cartItems");
  list.innerHTML = "";

  cart.forEach((item, i) => {
    list.innerHTML += `
      <div class="cart-item">
        ${item.name} - ₹${item.price}
        <button onclick="removeItem(${i})">❌</button>
      </div>
    `;
  });
}

function removeItem(i) {
  cart.splice(i,1);
  updateCart();
}

function placeOrder() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address || cart.length === 0) {
    alert("Fill everything");
    return;
  }

  let msg = "🛒 *SERAK ORDER*%0A%0A";
  let total = 0;

  cart.forEach(item => {
    msg += item.name + " - ₹" + item.price + "%0A";
    total += item.price;
  });

  msg += "%0A*Total:* ₹" + total + "%0A%0A";
  msg += "*Name:* " + name + "%0A";
  msg += "*Phone:* " + phone + "%0A";
  msg += "*Address:* " + address;

  let phoneNumber = "917085967649"; // CHANGE

  window.open(`https://wa.me/${phoneNumber}?text=${msg}`);

  cart = [];
  updateCart();
}

renderProducts();
</script>

</body>
</html>
