<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERAK</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: #fff;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  background: black;
}

header h2 {
  letter-spacing: 2px;
}

.hero {
  text-align: center;
  padding: 50px 20px;
}

.hero h1 {
  font-size: 32px;
}

.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 15px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  border-radius: 5px;
}

.cart {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  color: black;
  padding: 12px 16px;
  border-radius: 30px;
}

.form {
  padding: 15px;
}

input, textarea {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 5px;
  border: none;
}

footer {
  text-align: center;
  padding: 15px;
  color: #777;
}
</style>
</head>

<body>

<header>
  <h2>SERAK</h2>
</header>

<section class="hero">
  <h1>STREET. RAW. SERAK.</h1>
  <p>Modern streetwear for everyone</p>
</section>

<section class="products" id="products"></section>

<div class="form">
  <h3>Your Details</h3>
  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <textarea id="address" placeholder="Your Address"></textarea>
</div>

<div class="cart" onclick="orderNow()">
  🛒 Cart (<span id="count">0</span>)
</div>

<footer>© 2026 SERAK</footer>

<script>
const products = [
  {name: "Oversized Tee", price: 499, img: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b"},
  {name: "Street Hoodie", price: 1499, img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
  {name: "Cargo Pants", price: 1299, img: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"},
  {name: "Denim Jacket", price: 1999, img: "https://images.unsplash.com/photo-1512436991641-6745cdb1723f"}
];

let cart = [];

function renderProducts() {
  const container = document.getElementById("products");

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <div class="card-content">
          <h4>${p.name}</h4>
          <p>₹${p.price}</p>
          <button onclick="addToCart(${i})">Add to Cart</button>
        </div>
      </div>
    `;
  });
}

function addToCart(index) {
  cart.push(products[index]);
  document.getElementById("count").innerText = cart.length;

  alert("Added to cart");
}

function orderNow() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  if (!name || !phone || !address) {
    alert("Please fill all details");
    return;
  }

  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  let message = "🛒 *SERAK ORDER* %0A%0A";

  cart.forEach(item => {
    message += item.name + " - ₹" + item.price + "%0A";
  });

  let total = cart.reduce((sum, item) => sum + item.price, 0);

  message += "%0A*Total:* ₹" + total + "%0A%0A";
  message += "*Name:* " + name + "%0A";
  message += "*Phone:* " + phone + "%0A";
  message += "*Address:* " + address;

  let businessNumber = "7085967649"; // CHANGE THIS

  let url = `https://wa.me/${businessNumber}?text=${message}`;
  window.open(url);

  cart = [];
  document.getElementById("count").innerText = 0;
}

renderProducts();
</script>

</body>
</html>
