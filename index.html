<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<title>SERAK</title>

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* HEADER */
header {
  padding:18px;
  text-align:center;
  font-weight:700;
  letter-spacing:4px;
}

/* HERO */
.hero {
  height:65vh;
  background:url('https://images.unsplash.com/photo-1520975916090-3105956dac38') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

.hero-text {
  background:rgba(0,0,0,0.55);
  padding:25px;
  border-radius:12px;
  text-align:center;
}

.hero-text h1 {
  margin:0;
  font-size:32px;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
  padding:18px;
}

.card {
  background:#141414;
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card img {
  width:100%;
  height:190px;
  object-fit:cover;
}

.card-content {
  padding:12px;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  font-weight:500;
}

/* CART */
.cart-box {
  padding:18px;
}

.cart-item {
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

/* FLOAT BUTTON */
.cart-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:white;
  color:black;
  padding:14px 18px;
  border-radius:30px;
}

/* FORM */
input,textarea {
  width:90%;
  margin:6px auto;
  display:block;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* ADMIN PANEL */
.admin-panel {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:999;
  padding:20px;
}
</style>
</head>

<body>

<header>SERAK</header>

<section class="hero">
  <div class="hero-text">
    <h1>Street. Raw. SERAK</h1>
    <p>Built for everyday culture</p>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products"></section>

<!-- CART -->
<div class="cart-box">
  <h3>Cart</h3>
  <div id="cartItems"></div>

  <h3>Your Details</h3>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <textarea id="address" placeholder="Address"></textarea>
</div>

<div class="cart-btn" onclick="orderNow()">
  🛒 (<span id="count">0</span>)
</div>

<!-- ADMIN (HIDDEN) -->
<div class="admin-panel" id="adminPanel">
  <h2>Admin Panel</h2>
  <input id="adminUser" placeholder="Username">
  <input id="adminPass" type="password" placeholder="Password">
  <button onclick="adminLogin()">Login</button>

  <div id="adminContent" style="display:none;">
    <h3>Add Product</h3>
    <input id="pname" placeholder="Name">
    <input id="pprice" placeholder="Price">
    <input id="pimg" placeholder="Image URL">
    <button onclick="addProduct()">Add</button>
  </div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Oversized Tee",price:499,img:"https://images.unsplash.com/photo-1523381210434-271e8be1f52b"},
  {name:"Hoodie",price:1499,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* STORAGE */
function saveProducts(){localStorage.setItem("products",JSON.stringify(products));}
function saveCart(){localStorage.setItem("cart",JSON.stringify(cart));}

/* PRODUCTS */
function renderProducts(){
  let c=document.getElementById("products");
  c.innerHTML="";
  products.forEach((p,i)=>{
    c.innerHTML+=`
    <div class="card">
      <img src="${p.img}">
      <div class="card-content">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${i})">Add</button>
      </div>
    </div>`;
  });
}

function addToCart(i){
  cart.push(products[i]);
  saveCart();
  updateCart();
}

/* CART */
function updateCart(){
  document.getElementById("count").innerText=cart.length;
  let list=document.getElementById("cartItems");
  list.innerHTML="";
  cart.forEach((item,i)=>{
    list.innerHTML+=`
    <div class="cart-item">
      ${item.name} - ₹${item.price}
      <button onclick="removeItem(${i})">❌</button>
    </div>`;
  });
}

function removeItem(i){
  cart.splice(i,1);
  saveCart();
  updateCart();
}

/* USER SAVE */
let nameInput=document.getElementById("name");
let phoneInput=document.getElementById("phone");
let addressInput=document.getElementById("address");

function saveUser(){
  localStorage.setItem("name",nameInput.value);
  localStorage.setItem("phone",phoneInput.value);
  localStorage.setItem("address",addressInput.value);
}

nameInput.oninput=saveUser;
phoneInput.oninput=saveUser;
addressInput.oninput=saveUser;

function loadUser(){
  nameInput.value=localStorage.getItem("name")||"";
  phoneInput.value=localStorage.getItem("phone")||"";
  addressInput.value=localStorage.getItem("address")||"";
}

/* ORDER */
function orderNow(){
  let name=nameInput.value;
  let phone=phoneInput.value;
  let address=addressInput.value;

  if(!name||!phone||!address||cart.length===0){
    alert("Fill all details");
    return;
  }

  let msg="🛒 *SERAK ORDER*%0A%0A";
  let total=0;

  cart.forEach(item=>{
    msg+=item.name+" - ₹"+item.price+"%0A";
    total+=item.price;
  });

  msg+="%0A*Total:* ₹"+total+"%0A%0A";
  msg+="*Name:* "+name+"%0A";
  msg+="*Phone:* "+phone+"%0A";
  msg+="*Address:* "+address;

  let phoneNumber="91XXXXXXXXXX";

  window.open(`https://wa.me/${phoneNumber}?text=${msg}`);

  cart=[];
  saveCart();
  updateCart();
}

/* ADMIN ACCESS */
if(window.location.hash === "#admin"){
  document.getElementById("adminPanel").style.display="block";
}

/* ADMIN LOGIN */
function adminLogin(){
  if(adminUser.value==="admin" && adminPass.value==="1234"){
    document.getElementById("adminContent").style.display="block";
  } else {
    alert("Wrong login");
  }
}

function addProduct(){
  let p={
    name:pname.value,
    price:pprice.value,
    img:pimg.value
  };
  products.push(p);
  saveProducts();
  renderProducts();
}

/* INIT */
renderProducts();
updateCart();
loadUser();
</script>

</body>
</html>
